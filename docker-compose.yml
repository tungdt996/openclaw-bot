services:
  openclaw-gateway:
    build:
      context: .
      dockerfile: Dockerfile.openclaw
    image: openclaw-k8s-bot:local
    container_name: openclaw-gateway
    restart: unless-stopped
    environment:
      HOME: /home/node
      TERM: xterm-256color
      NODE_OPTIONS: "--max-old-space-size=1536"
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_ALLOWED_USERS: ${TELEGRAM_ALLOWED_USERS}
      OPENCLAW_AUTH_TOKEN: ${OPENCLAW_AUTH_TOKEN}
    volumes:
      - ./config/openclaw.json:/tmp/staging/openclaw.json:ro
      - ./config/mcporter.json:/tmp/staging/mcporter.json:ro
      - ./skills/kubernetes-ops:/tmp/staging/skills/kubernetes-ops:ro
      - ./skills/kubernetes-ops:/app/skills/kubernetes-ops:ro
      - openclaw-data:/home/node/.openclaw
    ports:
      - "127.0.0.1:18789:18789"
    entrypoint: ["sh", "-c"]
    command:
      - |
        mkdir -p /home/node/.openclaw/workspace /home/node/.openclaw/skills /home/node/.mcporter
        cp /tmp/staging/openclaw.json /home/node/.openclaw/openclaw.json
        sed -i "s|\${TELEGRAM_BOT_TOKEN}|$TELEGRAM_BOT_TOKEN|g" /home/node/.openclaw/openclaw.json
        sed -i "s|\${TELEGRAM_ALLOWED_USERS}|$TELEGRAM_ALLOWED_USERS|g" /home/node/.openclaw/openclaw.json
        sed -i "s|\${OPENCLAW_AUTH_TOKEN}|$OPENCLAW_AUTH_TOKEN|g" /home/node/.openclaw/openclaw.json
        cp /tmp/staging/mcporter.json /home/node/.mcporter/mcporter.json
        cp -r /tmp/staging/skills/kubernetes-ops /home/node/.openclaw/skills/kubernetes-ops
        echo ""
        echo "=========================================="
        echo "  OpenClaw Gateway - Access URLs"
        echo "=========================================="
        echo "  UI:  http://localhost:18789/?token=$OPENCLAW_AUTH_TOKEN"
        echo "  API: http://localhost:18789"
        echo "=========================================="
        echo ""
        exec node dist/index.js gateway --bind lan --port 18789 --allow-unconfigured
    networks:
      - openclaw-net
    depends_on:
      kubernetes-mcp-server:
        condition: service_started
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.5"
        reservations:
          memory: 512M
          cpus: "0.25"

  kubernetes-mcp-server:
    image: ghcr.io/containers/kubernetes-mcp-server:latest
    container_name: k8s-mcp-server
    restart: unless-stopped
    environment:
      KUBECONFIG: /home/nonroot/.kube/config
    command:
      - "--port"
      - "8089"
      - "--read-only"
      - "--stateless"
      - "--cluster-provider"
      - "kubeconfig"
      - "--log-level"
      - "2"
    volumes:
      - ./kubeconfig/config:/home/nonroot/.kube/config:ro
    expose:
      - "8089"
    networks:
      - openclaw-net
      - minikube
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 64M
          cpus: "0.1"

volumes:
  openclaw-data:
    driver: local

networks:
  openclaw-net:
    driver: bridge
  minikube:
    external: true
