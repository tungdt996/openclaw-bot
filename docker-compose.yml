services:
  openclaw:
    image: node:20-alpine
    container_name: openclaw-gateway
    restart: unless-stopped
    working_dir: /app
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - HOME=/home/node
    volumes:
      - ./config/openclaw.json:/home/node/.openclaw/openclaw.json:ro
      - openclaw-data:/home/node/.openclaw
      - openclaw-workspace:/home/node/.openclaw/workspace
    ports:
      - "127.0.0.1:18789:18789"
    command: >
      sh -c "
        npm install -g openclaw &&
        mkdir -p /home/node/.openclaw/workspace &&
        openclaw gateway start --allow-unconfigured
      "
    networks:
      - openclaw-net
    depends_on:
      kubernetes-mcp-server:
        condition: service_started
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.5"
        reservations:
          memory: 512M
          cpus: "0.25"

  kubernetes-mcp-server:
    image: ghcr.io/containers/kubernetes-mcp-server:latest
    container_name: k8s-mcp-server
    restart: unless-stopped
    command:
      - "--port"
      - "8089"
      - "--read-only"
      - "--log-level"
      - "2"
    volumes:
      - ./kubeconfig/config:/home/nonroot/.kube/config:ro
    expose:
      - "8089"
    networks:
      - openclaw-net
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 64M
          cpus: "0.1"

volumes:
  openclaw-data:
    driver: local
  openclaw-workspace:
    driver: local

networks:
  openclaw-net:
    driver: bridge
