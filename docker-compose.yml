services:
  openclaw-gateway:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw-gateway
    restart: unless-stopped
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_ALLOWED_USERS: ${TELEGRAM_ALLOWED_USERS}
    volumes:
      - ./config/openclaw.json:/home/node/.openclaw/openclaw.json
      - openclaw-workspace:/home/node/.openclaw/workspace
    ports:
      - "127.0.0.1:18789:18789"
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "lan",
        "--port",
        "18789",
        "--allow-unconfigured",
      ]
    networks:
      - openclaw-net
    depends_on:
      kubernetes-mcp-server:
        condition: service_started
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.5"
        reservations:
          memory: 512M
          cpus: "0.25"

  kubernetes-mcp-server:
    image: ghcr.io/containers/kubernetes-mcp-server:latest
    container_name: k8s-mcp-server
    restart: unless-stopped
    command:
      - "--port"
      - "8089"
      - "--read-only"
      - "--log-level"
      - "2"
    volumes:
      - ./kubeconfig/config:/home/nonroot/.kube/config:ro
    expose:
      - "8089"
    networks:
      - openclaw-net
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 64M
          cpus: "0.1"

volumes:
  openclaw-workspace:
    driver: local

networks:
  openclaw-net:
    driver: bridge
